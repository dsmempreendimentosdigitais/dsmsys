<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - DSM Sys</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a192f;
      --bg-card: rgba(17, 34, 64, 0.7);
      --text-main: #ccd6f6;
      --text-muted: #8892b0;
      --primary: #00f2fe;
      --primary-hover: #4facfe;
      --error: #ff4d4d;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(0, 242, 254, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(79, 172, 254, 0.05) 0%, transparent 50%);
    }

    .login-container {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      animation: fadeIn 0.5s ease-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
      display: inline-block;
    }

    .logo__dsm { color: var(--text-main); }
    .logo__sys { background: linear-gradient(90deg, #00f2fe, #4facfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .login-subtitle {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 32px;
    }

    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .input-group label {
      display: block;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 8px;
      font-weight: 500;
    }

    .input-group input {
      width: 100%;
      padding: 14px;
      background: rgba(10, 25, 47, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: var(--text-main);
      font-size: 15px;
      transition: all 0.3s ease;
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0, 242, 254, 0.1);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, var(--primary), var(--primary-hover));
      color: #0a192f;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: opacity 0.3s ease, transform 0.1s ease;
      margin-top: 10px;
    }

    .btn-login:hover {
      opacity: 0.9;
    }

    .btn-login:active {
      transform: scale(0.98);
    }

    .error-msg {
      color: var(--error);
      font-size: 13px;
      margin-top: 16px;
      display: none;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="logo">
      <span class="logo__dsm">DSM</span><span class="logo__sys">SYS</span>
    </div>
    <div class="login-subtitle">Acesso restrito à plataforma</div>

    <form id="login-form">
      <div class="input-group">
        <label for="username">Usuário</label>
        <input type="text" id="username" placeholder="Digite seu usuário" required autocomplete="username">
      </div>
      <div class="input-group">
        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="Digite sua senha" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn-login">Entrar</button>
      <div id="login-error" class="error-msg">Usuário ou senha incorretos.</div>
    </form>
  </div>

  <script>
    const AUTH_KEY = 'dsmsys_auth_user';

    // Se já estiver logado, redireciona direto
    if (sessionStorage.getItem(AUTH_KEY)) {
      window.location.href = '/docs/curso-canadense.html';
    }

    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;
      const errorEl = document.getElementById('login-error');

      if (user === 'dsmsys' && pass === 'dsm@2026') {
        errorEl.style.display = 'none';
        sessionStorage.setItem(AUTH_KEY, 'true');
        // Redireciona para o curso após o login
        window.location.href = '/docs/curso-canadense.html';
      } else {
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
